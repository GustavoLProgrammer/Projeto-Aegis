<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Aegis - Dashboard de Acompanhamento</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141417;
            --accent-blue: #3a86ff;
            --accent-green: #06d6a0;
            --accent-red: #e63946;
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --border-color: #26262b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 { font-size: 1.8rem; color: var(--text-main); }
        header h1 span { color: var(--accent-red); }

        .btn-voltar {
            background: #2a2a35;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .btn-voltar:hover { background: #3c3c4d; }

        .busca-protocolo-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { color: var(--text-muted); font-size: 0.9rem; }
        .input-group input {
            background: #0a0a0c;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent-blue); }

        .btn-buscar {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            height: 48px;
        }
        .btn-buscar:hover { background: #256bde; }

        .ocorrencias-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .ocorrencias-section h2 { font-size: 1.3rem; margin-bottom: 20px; color: var(--text-muted); }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td { padding: 14px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; }
        td { font-size: 0.95rem; }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pendente { background: rgba(230, 57, 70, 0.15); color: var(--accent-red); }
        .status-andamento { background: rgba(58, 134, 255, 0.15); color: var(--accent-blue); }
        .status-atendido { background: rgba(6, 214, 160, 0.15); color: var(--accent-green); }

        .sem-dados { text-align: center; color: var(--text-muted); padding: 30px 0; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>Painel <span>Aegis</span> - Acompanhamento</h1>
        <a href="login.html" class="btn-voltar">Voltar</a>
    </header>

    <div class="busca-protocolo-box">
        <div class="input-group">
            <label for="numeroProtocolo">Possui um protocolo? Digite-o para rastrear a viatura:</label>
            <input type="number" id="numeroProtocolo" placeholder="Ex: 1">
        </div>
        <button class="btn-buscar" onclick="buscarPorProtocolo()">Buscar Ocorrência</button>
    </div>

    <div class="ocorrencias-section">
        <h2 id="titulo-lista">Resultado da Busca por Protocolo</h2>
        <div id="tabela-area">
            <p class="sem-dados">Nenhuma ocorrência pesquisada ou ativa no momento.</p>
        </div>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
