<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Projeto Aegis - Cadastro</title>
</head>

<body>

    <h1>Projeto Aegis</h1>
    <form class="cadastro-container" id="formCadastro" onsubmit="event.preventDefault();">
        <img src="imagens/logo_aegis.png" alt="Logo Aegis" class="logo-aegis">
        <h1>Crie sua conta</h1>

        <p>Nome</p>
        <input class="nome" type="text" id="nomeUsu" placeholder="Seu nome completo" required minlength="3">

        <p>Email</p>
        <input class="email" type="email" name="email" id="emailUsu" placeholder="Seu email" required>

        <p>Senha</p>
        <input class="senha" type="password" name="senha" id="senhaUsu" placeholder="Sua senha" required minlength="6">

        <p>CPF</p>
        <input class="cpf" type="text" id="cpfUsu" placeholder="000.000.000-00" required
            pattern="(\d{3}\.\d{3}\.\d{3}-\d{2})|(\d{11})"
            title="Digite o CPF no formato 000.000.000-00 ou apenas números">

        <p>Telefone</p>
        <input class="telefone" type="tel" id="telUsu" placeholder="(00) 00000-0000" required
            pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}" title="Digite o telefone no formato (00) 00000-0000">

        <p>CEP</p>
        <input class="cep" type="text" id="cepUsu" placeholder="00000-000" required pattern="[0-9]{5}-[0-9]{3}|[0-9]{8}"
            title="Digite o CEP no formato 00000-000">

        <p>Endereço</p>
        <input class="endereco" type="text" id="endUsu" placeholder="Rua, número, bairro..." required>

        <button type="submit" onclick="cadastrarUsuario()">Cadastrar</button>

        <p class="com-conta">Já tem uma conta? <a href="login.html"> Entrar</a></p>
        <p class="voltar"><a href="index.html">Voltar para a página inicial</a></p>
    </form>
    <script src="/index.js"></script>
</body>

</html>
