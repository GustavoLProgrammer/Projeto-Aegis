<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel GPS - Monitoramento</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        #map { height: 85vh; width: 100%; }
        #painel-ajuda { padding: 12px; background: #f4f4f4; font-family: Arial, sans-serif; border-bottom: 1px solid #ccc; }
        button { padding: 10px 15px; background: #ff4d4d; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div id="painel-ajuda">
        <button onclick="ativarModoSOS()"> Solicitar Ajuda no Mapa</button>
        <span id="status" style="margin-left: 15px; font-weight: bold;">Clique no botão e depois selecione o ponto no mapa.</span>
    </div>
    
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([-23.55052, -46.633308], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const socket = io();
        let modoSOS = false;

        function ativarModoSOS() {
            modoSOS = true;
            document.getElementById('status').innerText = " Modo SOS ativo! Clique em um local no mapa...";
            document.getElementById('status').style.color = "red";
        }

        map.on('click', function(e) {
            if (modoSOS) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                const horario = new Date().toLocaleTimeString('pt-BR');

                document.getElementById('status').innerText = "Identificando endereço do local...";
                document.getElementById('status').style.color = "orange";

                // Busca o nome da rua baseado na latitude e longitude
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                    .then(response => response.json())
                    .then(data => {
                        const enderecoCompleto = data.display_name || "Endereço não mapeado";

                        socket.emit('novo_pedido_ajuda', { 
                            lat: lat, 
                            lng: lng, 
                            endereco: enderecoCompleto, 
                            horario: horario 
                        });
                        
                        modoSOS = false;
                        document.getElementById('status').innerText = " Alerta de ajuda enviado!";
                        document.getElementById('status').style.color = "green";
                    })
                    .catch(err => {
                        socket.emit('novo_pedido_ajuda', { lat: lat, lng: lng, endereco: "Endereço indisponível", horario: horario });
                        modoSOS = false;
                        document.getElementById('status').innerText = " Alerta enviado (Sem endereço).";
                        document.getElementById('status').style.color = "green";
                    });
            }
        });

        socket.on('fixar_sos_no_mapa', function(data) {
            const marcadorSOS = L.marker([data.lat, data.lng]).addTo(map);
            marcadorSOS.bindPopup(`
                <b> SOLICITAÇÃO SOS</b><br>
                <b>Horário:</b> ${data.horario}<br>
                <b>Local:</b> ${data.endereco}
            `).openPopup();
        });
    </script>
</body>
</html>
