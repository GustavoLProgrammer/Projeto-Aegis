<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Aegis</title>
</head>
<body>
    <h1>Projeto Aegis</h1>

    <div id="login-container">
        <input type="text" id="user-name" placeholder="Seu nome">
        <select id="user-role">
            <option value="usuario">Sou Usuário (Visualizar)</option>
            <option value="dev">Sou Desenvolvedor (Gerenciar)</option>
        </select>
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="interface-user" style="display: none;">
        <h2>Bem Vindo, <span id="span-nome"></span>!</h2>
        <p>Você está na área de visualização pública.</p>
        <button onclick="deslogar()">Sair</button>
    </div>

    <div id="interface-dev" style="display: none;">
        <hr>
        <h2>Painel do Desenvolvedor</h2>
        <p>Ferramentas de edição e logs do sistema liberadas.</p>
        <button onclick="acaoRestrita()">Executar Comando Dev</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
